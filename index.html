<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Help Center Chatbot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="chatbot.css" />
</head>
<body>
  <div class="chatbot-launcher" aria-label="Open chatbot" title="チャットで質問">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M12 3C6.48 3 2 6.92 2 11.5c0 2.2 1.04 4.19 2.77 5.69-.16.64-.73 2.9-.76 3.08 0 0-.02.18.09.25.11.07.25.02.25.02.33-.05 3.78-2.48 4.38-2.9.94.26 1.94.4 2.98.4 5.52 0 10-3.92 10-8.5S17.52 3 12 3z" />
    </svg>
  </div>

  <section class="chatbot-container" role="dialog" aria-modal="true" aria-hidden="true" aria-label="Help Center Chatbot">
    <header class="chatbot-header">
      <div>
        <div class="chatbot-header__title">
          <span class="chatbot-avatar" aria-hidden="true">LN</span>
          <div>
            <div>Leapnet Help Center</div>
            <div class="chatbot-status"><span aria-hidden="true"></span>オンライン</div>
          </div>
        </div>
      </div>
      <button class="chatbot-close" type="button" aria-label="Close chatbot">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M18.3 5.71a1 1 0 0 0-1.42 0L12 10.59 7.12 5.7A1 1 0 0 0 5.7 7.12L10.59 12l-4.9 4.88a1 1 0 0 0 1.42 1.42L12 13.41l4.88 4.89a1 1 0 0 0 1.42-1.42L13.41 12l4.89-4.88a1 1 0 0 0 0-1.41z" />
        </svg>
      </button>
    </header>

    <div class="chatbot-messages" id="chatbotMessages" aria-live="polite"></div>

    <footer class="chatbot-footer">
      <form class="chatbot-form" id="chatbotForm" autocomplete="off">
        <label class="sr-only" for="chatbotInput">メッセージ</label>
        <textarea
          id="chatbotInput"
          class="chatbot-input"
          placeholder="ご質問を入力してください…"
          aria-label="メッセージを入力"
          rows="3"
          required
        ></textarea>
        <button class="chatbot-submit" type="submit" aria-label="Send message">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
          </svg>
        </button>
      </form>
    </footer>
  </section>

  <script src="chatbot.js"></script>
</body>
</html>
